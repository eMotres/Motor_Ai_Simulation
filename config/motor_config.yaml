# Electric Motor Configuration
# Default parameters for BLDC/PMSM motor
# 
# This file is the SINGLE SOURCE OF TRUTH for all motor parameters.
# The Python API and Web UI read from this file dynamically.
# To add a new parameter:
#   1. Add it to geometry section below
#   2. Add metadata to geometry_schema section
#   3. If derived, add calculation to derived_params section

# ============================================
# GEOMETRY PARAMETERS (editable in UI)
# ============================================
geometry:
  # Stator
  stator_diameter: 200                 # outer diameter of stator
  slot_height: 16                      # stator slot height
  core_thickness: 3.8                  # stator core thickness
  num_seg: 6                           # Number of segments in stator
  num_slots_per_segment: 6             # Number of slots per segment
  num_poles_per_segment: 7             # Number of poles per segment
  stator_width: 30                     # stator width (axial length)
  air_gap: 0.65                        # air gap between stator and rotor
  tooth_width: 8.6                     # tooth width at the stator outer radius
  insulation_thickness: 0.15           # insulation thickness between stator core and slot
  wire_width: 4                        # width of the wire in the slot
  wire_height: 0.6                     # height of the wire in the slot
  wire_spacing_x: 0.1                  # spacing between wires in x direction
  wire_spacing_y: 0.13                 # spacing between wires in y direction
  num_wires_per_slot: 15               # number of wires per slot
  slot_hs: 0.2                         # slot opening height

  # Rotor
  magnet_height: 13.8                  # magnet height
  rotor_house_height: 1.2              # rotor housing thickness

# ============================================
# DERIVED PARAMETERS (computed from geometry)
# ============================================
derived_params:
  stator_outer_radius: "stator_diameter / 2"
  stator_inner_radius: "stator_outer_radius - core_thickness - slot_height"
  rotor_outer_radius: "stator_inner_radius - air_gap"
  rotor_inner_radius: "rotor_outer_radius - magnet_height - rotor_house_height"
  num_slots: "num_seg * num_slots_per_segment"
  num_poles: "num_seg * num_poles_per_segment"
  angle_slot: "360 / num_slots"
  angle_pole: "360 / num_poles"
  slot_width: "wire_width + 2 * wire_spacing_x + 2 * insulation_thickness"
  slot_pitch: "2 * 3.14159 / num_slots"
  pole_pitch: "2 * 3.14159 / num_poles"

# ============================================
# PARAMETER SCHEMA (metadata for UI generation)
# ============================================
geometry_schema:
  # Stator Parameters
  stator_diameter:
    label: "Stator Diameter"
    unit: "mm"
    type: "float"
    min: 100
    max: 600
    step: 50
    group: "stator"
    description: "Outer diameter of the stator"
    
  slot_height:
    label: "Slot Height"
    unit: "mm"
    type: "float"
    min: 1
    max: 100
    step: 0.1
    group: "stator"
    description: "Height of stator slots"
    
  core_thickness:
    label: "Core Thickness"
    unit: "mm"
    type: "float"
    min: 0.5
    max: 50
    step: 0.1
    group: "stator"
    description: "Thickness of stator core (back iron)"
    
  num_seg:
    label: "Number of Segments"
    unit: ""
    type: "int"
    min: 1
    max: 12
    step: 1
    group: "segmentation"
    description: "Number of segments in stator"
    
  num_slots_per_segment:
    label: "Slots per Segment"
    unit: ""
    type: "int"
    min: 4
    max: 6
    step: 2
    group: "segmentation"
    description: "Number of slots per segment"
    
  num_poles_per_segment:
    label: "Poles per Segment"
    unit: ""
    type: "int"
    min: 5
    max: 7
    step: 2
    group: "segmentation"
    description: "Number of poles per segment"
    
  stator_width:
    label: "Stator Width"
    unit: "mm"
    type: "float"
    min: 5
    max: 500
    step: 5
    group: "stator"
    description: "Axial length of stator"
    
  air_gap:
    label: "Air Gap"
    unit: "mm"
    type: "float"
    min: 0.1
    max: 3
    step: 0.05
    group: "stator"
    description: "Air gap between stator and rotor"
    
  tooth_width:
    label: "Tooth Width"
    unit: "mm"
    type: "float"
    min: 4
    max: 50
    step: 0.1
    group: "slot"
    description: "Tooth width at the stator outer radius"
    
  insulation_thickness:
    label: "Insulation Thickness"
    unit: "mm"
    type: "float"
    min: 0.05
    max: 1
    step: 0.05
    group: "slot"
    description: "Insulation between stator core and slot"
    
  wire_width:
    label: "Wire Width"
    unit: "mm"
    type: "float"
    min: 1
    max: 12
    step: 0.5
    group: "winding"
    description: "Width of the wire in the slot"
    
  wire_height:
    label: "Wire Height"
    unit: "mm"
    type: "float"
    min: 0.5
    max: 3
    step: 0.1
    group: "winding"
    description: "Height of the wire in the slot"
    
  wire_spacing_x:
    label: "Wire Spacing X"
    unit: "mm"
    type: "float"
    min: 0.01
    max: 0.2
    step: 0.01
    group: "winding"
    description: "Spacing between wires in x direction"
    
  wire_spacing_y:
    label: "Wire Spacing Y"
    unit: "mm"
    type: "float"
    min: 0.01
    max: 0.2
    step: 0.01
    group: "winding"
    description: "Spacing between wires in y direction"
    
  num_wires_per_slot:
    label: "Wires per Slot"
    unit: ""
    type: "int"
    min: 1
    max: 100
    step: 1
    group: "winding"
    description: "Number of wires per slot"
    
  slot_hs:
    label: "Slot Opening Height"
    unit: "mm"
    type: "float"
    min: 0.01
    max: 1
    step: 0.01
    group: "slot"
    description: "Height of the slot opening"
    
  # Rotor Parameters
  magnet_height:
    label: "Magnet Height"
    unit: "mm"
    type: "float"
    min: 2
    max: 50
    step: 0.1
    group: "rotor"
    description: "Height/thickness of permanent magnets"
    
  rotor_house_height:
    label: "Rotor Housing Thickness"
    unit: "mm"
    type: "float"
    min: 0.5
    max: 5
    step: 0.1
    group: "rotor"
    description: "Thickness of rotor housing"

# ============================================
# GROUP DEFINITIONS (for UI organization)
# ============================================
parameter_groups:
  stator:
    label: "Stator Parameters"
    order: 1
  segmentation:
    label: "Segmentation"
    order: 2
  slot:
    label: "Slot Details"
    order: 3
  winding:
    label: "Winding"
    order: 4
  rotor:
    label: "Rotor Parameters"
    order: 5

# ============================================
# MESH GENERATION PARAMETERS
# ============================================
mesh:
  n_radial: 10                   # Number of radial divisions
  n_angular: 64                  # Number of angular divisions
  n_angular_slots: 8             # Angular divisions per slot

# ============================================
# MATERIAL ASSIGNMENTS
# ============================================
materials:
  stator_core: m27_silicon_steel
  slot: copper
  air_gap: air
  rotor_core: m27_silicon_steel
  magnet: ndfeb_n42
  shaft: carbon_steel

# ============================================
# CUSTOM MATERIALS (optional)
# ============================================
custom_materials: {}
  # Example:
  # custom_material_1:
  #   name: "Custom Steel"
  #   mu_r: 3000
  #   sigma: 1.5e6
  #   B_sat: 1.9

# ============================================
# SIMULATION PARAMETERS (for future use)
# ============================================
simulation:
  max_current: 10.0              # Maximum phase current [A]
  frequency: 50.0                # Electrical frequency [Hz]
  rpm: 2000                      # Rotation speed [RPM]
